# ============================================================================
# ENTERPRISE GALAXY: Layer 4 DDoS Protection (Kernel TCP Tweaks)
# ============================================================================
# PURPOSE: Protect against SYN flood, connection exhaustion, Slowloris
# SOCIAL NETWORK AWARE: Balanced settings that DON'T break legitimate traffic
#
# DEPLOYMENT:
# 1. Copy to server: scp docker/sysctl-ddos-protection.conf root@YOUR_SERVER_IP:/etc/sysctl.d/99-ddos-protection.conf
# 2. Apply: sudo sysctl --system
# 3. Verify: sudo sysctl -a | grep -E "(syncookies|syn_backlog|synack_retries|fin_timeout)"
#
# REVERT: sudo rm /etc/sysctl.d/99-ddos-protection.conf && sudo sysctl --system
# ============================================================================

# ============================================================================
# SYN Flood Protection (CRITICAL for Layer 4 DDoS)
# ============================================================================

# Enable SYN cookies when SYN queue is full
# Prevents SYN flood from exhausting memory
# 0 = disabled, 1 = enabled only when SYN queue full (recommended)
net.ipv4.tcp_syncookies = 1

# Increase SYN backlog queue size (pending connections)
# Default: 1024 (too small for DDoS), Enterprise: 4096
# Holds SYN packets waiting for ACK (3-way handshake)
net.ipv4.tcp_max_syn_backlog = 4096

# Reduce SYN-ACK retries (handshake timeout)
# Default: 5 (31 seconds total), Social-friendly: 2 (3 seconds total)
# Balance: Fast timeout for bots, reasonable for legitimate slow connections
net.ipv4.tcp_synack_retries = 2

# ============================================================================
# Connection Cleanup (Anti-Slowloris + Memory Optimization)
# ============================================================================

# Reduce FIN-WAIT-2 timeout (connection closing)
# Default: 60 seconds, Enterprise: 30 seconds
# Frees up sockets faster when client closes connection
net.ipv4.tcp_fin_timeout = 30

# Reduce TIME-WAIT timeout (socket reuse)
# Default: 60 seconds, Enterprise: 15 seconds
# Allows faster socket reuse for high-traffic servers
# WARNING: Too aggressive (<15s) can break legitimate retransmissions
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 15

# Increase max connection tracking entries
# Default: 65536, Enterprise: 131072
# Prevents "nf_conntrack: table full" errors under DDoS
net.netfilter.nf_conntrack_max = 131072

# ============================================================================
# TCP Performance Optimization (Secondary benefits)
# ============================================================================

# Enable TCP window scaling (better throughput)
# IMPORTANT: Don't touch - default is good (1 = enabled)
# net.ipv4.tcp_window_scaling = 1

# Enable selective acknowledgments (better loss recovery)
# IMPORTANT: Don't touch - default is good (1 = enabled)
# net.ipv4.tcp_sack = 1

# Disable slow start after idle (better for WebSocket keepalive)
# Default: 1 (enabled), Social-friendly: 0 (disabled)
# Prevents bandwidth throttling after idle periods (important for WebSocket)
net.ipv4.tcp_slow_start_after_idle = 0

# ============================================================================
# IMPORTANT NOTES
# ============================================================================
#
# SOCIAL NETWORK SAFE:
# - Mobile 3G users: 2 SYN-ACK retries = 3 seconds (enough for high latency)
# - WebSocket connections: No timeout reduction (handled by Nginx)
# - Audio streaming: No timeout reduction (handled by Nginx)
# - Slow uploads: No timeout reduction (handled by Nginx client_body_timeout)
#
# NOT INCLUDED (Too aggressive for social networks):
# - net.ipv4.tcp_synack_retries = 1 (too fast, breaks mobile)
# - net.ipv4.tcp_fin_timeout = 15 (too fast, can break slow close)
# - net.ipv4.tcp_keepalive_* (managed by application layer)
#
# MONITORING:
# - Check SYN queue overflow: netstat -s | grep -i "SYNs to LISTEN"
# - Check conntrack usage: cat /proc/sys/net/netfilter/nf_conntrack_count
# - Check TIME-WAIT sockets: ss -tan | grep TIME-WAIT | wc -l
#
# ROLLBACK:
# If any issues occur, delete this file and run: sudo sysctl --system
# ============================================================================
