        # FastCGI buffering (REQUIRED for caching)
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;
    }

    # API Routes (generic, lower priority than audio streaming)
    # CRITICAL FIX: Disable FastCGI cache for ALL API endpoints
    # BUG: try_files + internal redirect causes NGINX to re-evaluate location blocks
    # Solution: Direct FastCGI pass (no try_files!) with explicit cache bypass
    # ENTERPRISE GALAXY SECURITY: Audio upload rate limiting (1 req/sec)
    # Prevents PHP-FPM worker exhaustion via slow POST attacks
    # ENTERPRISE FIX: Logging endpoints whitelisted from rate limiting
    # Frontend sends logs every few seconds - higher rate needed
    location ~ ^/api/(logs/client|enterprise-logging)$ {
        # NO rate limiting for logging endpoints (prevent 429 loop)
        
        include fastcgi_params;
        fastcgi_pass php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_intercept_errors off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_send_timeout 60s;
    }

    location ~ ^/api/audio$ {
        limit_req zone=upload burst=3 nodelay;  # Max 1 req/sec + burst 3
        limit_req_status 429;  # Too Many Requests

        # Standard FastCGI pass
        include fastcgi_params;
        fastcgi_pass php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_intercept_errors off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_send_timeout 60s;
    }

    # ENTERPRISE FIX: Logging endpoints whitelisted from rate limiting
    # Frontend sends logs every few seconds - higher rate needed
    location ~ ^/api/(logs/client|enterprise-logging)$ {
        # NO rate limiting for logging endpoints (prevent 429 loop)
        
        include fastcgi_params;
        fastcgi_pass php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_intercept_errors off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_send_timeout 60s;
    }

    location ~ ^/api/ {
        # ENTERPRISE FIX: Disable FastCGI cache explicitly
        # MUST be set BEFORE fastcgi_pass to take effect!
        fastcgi_cache_bypass 1;
        fastcgi_no_cache 1;

        # Debug headers to verify cache bypass
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Cache-Disabled "API-no-cache" always;

        # FastCGI direct pass (NO try_files = NO internal redirect!)
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_URI $request_uri;

        # FastCGI buffering (required for proper operation)
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;
    }

    # Main PHP handler
    location / {
        # ====================================================================
        # ENTERPRISE GALAXY: Rate Limiting - SOCIAL NETWORK AWARE (2025-11-23)
        # ====================================================================
        # PROTECTION: Prevents HTTP flood DDoS attacks
        # SOCIAL NETWORK AWARE:
        # - Rate: 1000 req/min = 16 req/sec (permissivo per scroll rapido)
        # - Burst: 50 requests (scroll feed carica 10-20 post × 2-3 req each)
        # - Nodelay: No ritardo per richieste burst (migliore UX)
        #
        # SCENARIO LEGITTIMO:
        # - User scorre feed: 20 requests in 2 sec → Burst permette, poi rate limit
        # - User naviga: 5 pages in 1 min → Ampiamente sotto soglia
        #
        # SCENARIO ATTACK:
        # - Botnet 500 IP: 500 × 16 req/sec = 8,000 req/sec
        # - PHP-FPM: 50 workers × 20 req/sec = 1,000 req/sec capacity
        # - MITIGATO: Ogni IP limitato a 16 req/sec, non può saturare
        # ====================================================================
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========================================================================
    # PHP-FPM configuration + FastCGI HTML Cache (TTFB Optimization)
    # ========================================================================
    # Caches HTML pages for anonymous users (TTFB: 109ms → <10ms)
    # Bypass for: logged users, query strings, non-GET requests
    # ========================================================================
    location ~ \.php$ {
        try_files $uri =404;

        # FastCGI cache configuration (HTML pages only, anonymous traffic)
        fastcgi_cache html_cache;
        fastcgi_cache_valid 200 5m;                         # Cache 200 OK for 5 minutes
        fastcgi_cache_use_stale error timeout updating;     # Serve stale on backend error
        fastcgi_cache_lock on;                              # Prevent thundering herd
        fastcgi_cache_lock_timeout 5s;                      # Max wait for lock

        # ENTERPRISE CACHE KEY: Use cleaned args (tracking params stripped)
        # CRITICAL FIX: Use $uri_path (original request path) NOT $uri (rewritten to /index.php)
        # $uri_path = extracted from $request_uri (e.g., /login, /u/xxx, NOT /index.php)
        # $clean_args = result of 8-stage cascading cleanup (fbclid, gclid, utm_* removed)
        # Functional params (page, sort, filter, etc.) are PRESERVED
        set $cache_key_suffix "";
        if ($clean_args != "") {
            set $cache_key_suffix "?$clean_args";
        }
        fastcgi_cache_key "$scheme$request_method$host$uri_path$cache_key_suffix";

        # Cache bypass conditions (smart bypass based on route type)
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;

        # Ignore PHP cache headers (force caching)
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;

        # Headers for debugging
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$scheme$request_method$host$uri_path$cache_key_suffix" always;
        add_header X-Public-Route "$is_public_route" always;
        add_header X-Query-Original "$args" always;
        add_header X-Query-Cleaned "$clean_args" always;
        add_header X-URI-Path "$uri_path" always;
        add_header X-URI-Rewritten "$uri" always;

        # ====================================================================
        # Security Headers (MUST be in location block for FastCGI)
        # ====================================================================
        # HSTS Preload: 2 years (63072000s) + preload directive
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HTTP/3 Advertisement
        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        # ====================================================================
        # ENTERPRISE FIX: Disable browser caching for /auth/* pages (CSRF)
        # ====================================================================
        # CRITICAL: Login/register pages contain dynamic CSRF tokens
        # Browser caching causes token mismatch → login fails on first attempt
        # Solution: Force browsers to NEVER cache auth pages (always fetch fresh)
        # ====================================================================
        set $is_auth_page 0;
        if ($uri_path ~* "^/auth/") {
            set $is_auth_page 1;
        }
        if ($is_auth_page = 1) {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;
    }

    # Custom error pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;

    # =========================================================================
    # ENTERPRISE SECURITY V12: Block ALL direct access to media files
    # =========================================================================
    # ALL media (audio, photos, avatars) served ONLY via authenticated API
    # Defense-in-depth: Even if someone guesses file path, they get 403
    #
    # Audio Posts: /api/audio/{id}/stream (requires auth + visibility check)
    # Journal Audio: /api/journal/media/{uuid}/stream (requires auth + ownership)
    # Journal Photos: /api/journal/media/{uuid}/stream (requires auth + ownership)
    # Avatars: /api/user/avatar/{uuid} (if public needed, use CDN with signed URLs)
    # =========================================================================

    # Block ALL audio files (posts + journal + DM)
    location ~ ^/storage/uploads/audio/ {
        deny all;
        return 403;
    }

    # Block journal photos (E2E encrypted, AES-256-GCM)
    location ~ ^/storage/uploads/journal/ {
        deny all;
        return 403;
    }

    # Block avatars (no external access)
    location ~ ^/storage/uploads/avatars/ {
        deny all;
        return 403;
    }

    # Block temp uploads (should never be public)
    location ~ ^/storage/uploads/temp/ {
        deny all;
        return 403;
    }

    # Deny access to storage directory (except public assets)
    location ~ ^/storage/(?!uploads/) {
        deny all;
    }
}

# HTTP Server (port 80 - redirect to HTTPS)
server {
    listen 80;
    server_name www.need2talk.it need2talk.it;

    # Document root (required for honeypot PHP execution)
    root /var/www/html/public;
    index index.php;

    # ========================================================================
    # ENTERPRISE GALAXY: HTTP Honeypot Trap (2025-11-23)
    # ========================================================================
    # Intercept scanner attempts on HTTP BEFORE redirect
    # Pass to PHP → trigger HoneypotController::trap() → instant ban
    #
    # PERFORMANCE: ~10-15ms overhead ONLY for scanners (not legitimate traffic)
    # SECURITY: Extends honeypot system to HTTP layer (was HTTPS-only)
    # ========================================================================
    location ~ ^/(\.env|\.git|wp-admin|wp-login\.php|wp-config\.php|wp-content|wp-includes|xmlrpc\.php|phpinfo\.php|info\.php|test\.php|config\.php|configuration\.php|settings\.php|database\.(yml|php)|backup\.sql|dump\.sql|shell\.php|c99\.php|r57\.php|administrator|phpmyadmin|pma|adminer\.php|\.aws|\.ssh|id_rsa|docker-compose\.yml|Dockerfile|secrets\.json|credentials\.json|\.htpasswd|\.htaccess|composer\.(json|lock)|package(-lock)?\.json|\.npmrc) {
        # Pass to PHP-FPM for honeypot processing
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_intercept_errors off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # ENTERPRISE: Log honeypot triggers
        access_log /var/log/nginx/honeypot_http.log combined;
    }

    # Redirect all OTHER HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# SECURITY: Catch-all block for unknown domains (prevents domain hijacking)
# Returns 444 (connection closed) for any domain except need2talk.it
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # SSL certificates (required even for rejection)
    ssl_certificate /etc/letsencrypt/live/www.need2talk.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.need2talk.it/privkey.pem;

    # Log blocked domains for security monitoring
    access_log /var/log/nginx/blocked_domains.log;
    error_log /var/log/nginx/blocked_domains_error.log;

    # Return 444 (connection closed without response)
    return 444;
}

# HTTP Server for localhost ONLY (Docker healthcheck)
# SECURITY: Block direct IP access from external sources
server {
    listen 80;
    server_name 127.0.0.1 localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Timeout Configuration
    client_body_timeout 10s;  # SECURITY: Prevent slow POST worker exhaustion
    client_header_timeout 10s;  # SECURITY: Prevent slow header attacks
    client_max_body_size 10M;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/need2talk_access.log;
    error_log /var/log/nginx/need2talk_error.log;

    # ENTERPRISE: Health check endpoint (Docker healthcheck)
    # Returns 200 OK without touching PHP/PostgreSQL
    # Used by: Docker HEALTHCHECK, monitoring systems, load balancers
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Deny access to scripts/ directory
    location ^~ /scripts/ {
        deny all;
        return 404;
    }

    # Deny access to sensitive files in public/
    location ~ ^/public/(admin-clear-opcache|opcache-status-check)\.php$ {
        deny all;
        return 404;
    }

    # ========================================================================
    # ENTERPRISE GALAXY SECURITY FIX (2026-02-01): Block dangerous files in assets
    # ========================================================================
    # Prevents accidental exposure of PHP, SQL, env files in public directories
    # Root cause: rsync/scp can accidentally copy entire project to public/
    # ========================================================================

    # Block PHP files in assets directory (they should NEVER be here)
    location ~ ^/assets/.*\.php$ {
        deny all;
        return 403;
    }

    # Block SQL/backup files anywhere in public
    location ~ \.(sql|bak|old|orig|backup|dump)$ {
        deny all;
        return 403;
    }

    # Block .env files and dotfiles (second layer of protection)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Block config/vendor/app directories in assets (should never exist)
    location ~ ^/assets/(js|css)/(app|vendor|config|routes|bootstrap|database|storage)/ {
        deny all;
        return 403;
    }

    # ========================================================================
    # ENTERPRISE GALAXY: Service Worker Configuration (2025-11-28)
    # ========================================================================
    # Service Worker for audio caching (IndexedDB + Browser cache)
    # Requires Service-Worker-Allowed header to control root scope from /assets/
    # ========================================================================
    location = /assets/js/audio/sw-audio-cache.js {
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Type "application/javascript";

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # =========================================================================
    # STATIC FILES CACHING - ENTERPRISE V4 (2025-12-08)
    # =========================================================================
    # IMPORTANT: CSS/JS use query-string versioning (?v=xxx), NOT content hashes.
    # The "immutable" directive makes browsers ignore query strings completely!
    # Solution: Use immutable ONLY for truly immutable assets (fonts, images).
    # =========================================================================

    # JS and CSS: Long cache BUT respect query string versioning
    # NO immutable - browser will re-fetch if URL (including ?v=) changes
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        access_log off;
    }

    # Truly immutable assets: fonts, images (content rarely changes)
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security headers for static files
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        access_log off;
    }

    # Audio files
    location ~* \.(webm|mp3)$ {
        expires 1M;
        add_header Cache-Control "public";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive file types
    # NOTE: sql and env removed - handled by honeypot trap (instant ban)
    location ~ \.(log|md|gitignore|gitkeep)$ {
