user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ============================================================================
# ENTERPRISE GALAXY: Compression Modules (2025-01-10)
# ============================================================================
# Multi-algorithm compression stack (Gzip → Brotli → Zstd)
# All modules compiled from source, version-matched to NGINX 1.28.0
# ============================================================================
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_zstd_filter_module.so;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Security: Hide Nginx version in headers and error pages
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 64M;

    # ========================================================================
    # ENTERPRISE GALAXY: Anti-Slowloris Timeouts (2025-11-23)
    # ========================================================================
    # Previene connection exhaustion attacks senza impattare UX
    # - client_header_timeout: Header HTTP sono sempre piccoli (<1KB)
    # - client_body_timeout: Upload 64MB @ 1Mbps = ~8min, 10s è per prevenire slow POST
    # - send_timeout: Download audio 500KB @ 1Mbps = ~5s, 30s lascia margine
    # ========================================================================
    client_header_timeout 10s;     # Timeout header HTTP (Slowloris protection)
    client_body_timeout 30s;       # Timeout body upload (permette upload lenti ma non troppo)
    send_timeout 30s;              # Timeout invio risposta (permette download audio)

    # ========================================================================
    # COMPRESSION: Multi-Algorithm Strategy (Zstd → Brotli → Gzip)
    # ========================================================================
    # ENTERPRISE GALAXY (2025-01-10): Triple-layer compression stack
    # Layer 1: Zstd (Facebook) - 10-20% better than Brotli (cutting-edge)
    # Layer 2: Brotli (Google) - 20-30% better than Gzip (modern browsers)
    # Layer 3: Gzip - Universal fallback (IE11, old Android)
    # Browser negotiation: Client sends Accept-Encoding, NGINX picks best
    # ========================================================================

    # Gzip compression - FALLBACK for legacy browsers
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/x-javascript
               application/xml application/xml+rss application/rss+xml
               application/atom+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 256;

    # ========================================================================
    # BROTLI COMPRESSION - ENTERPRISE GALAXY (2025-01-10)
    # ========================================================================
    # Custom-compiled from google/ngx_brotli for NGINX 1.28.0
    # Performance: 20-30% better compression than Gzip
    # Browser support: Chrome, Firefox, Safari, Edge (95%+ coverage)
    # Fallback: Gzip for legacy browsers (IE11, old Android)
    # ========================================================================

    # Brotli dynamic compression (on-the-fly)
    brotli on;
    brotli_comp_level 6;                          # Level 6 = optimal balance (speed vs ratio)
    brotli_types text/plain text/css text/xml text/javascript
                 application/json application/javascript application/x-javascript
                 application/xml application/xml+rss application/rss+xml
                 application/atom+xml font/truetype font/opentype
                 application/vnd.ms-fontobject image/svg+xml;
    brotli_min_length 256;                        # Only compress files >256 bytes

    # Brotli static (serve pre-compressed .br files if available)
    brotli_static on;                             # Serves .br files directly (fastest)

    # ========================================================================
    # ZSTD COMPRESSION - ENTERPRISE GALAXY (2025-01-10)
    # ========================================================================
    # Facebook's Zstandard: 10-20% better than Brotli
    # Browser support: Chrome 123+, Firefox 126+ (cutting-edge)
    # Fallback chain: Zstd → Brotli → Gzip (maximum compatibility)
    # ========================================================================

    # Zstd dynamic compression (on-the-fly)
    zstd on;
    zstd_comp_level 6;                            # Level 6 = optimal (same as Brotli)
    zstd_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/x-javascript
               application/xml application/xml+rss application/rss+xml
               application/atom+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    zstd_min_length 256;                          # Only compress files >256 bytes

    # Buffer settings
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;

    # ========================================================================
    # ENTERPRISE GALAXY: Rate Limiting - SOCIAL NETWORK AWARE (2025-11-23)
    # ========================================================================
    # METACOGNITIVE DESIGN: Social network users fanno TANTE richieste legittime
    # - Feed scroll: 10-20 req/sec per brevi burst
    # - Multiple tabs: 3-5 richieste simultanee
    # - Audio streaming: Chunk requests rapide
    # - Reactions (like/comment): Richieste API rapide
    #
    # STRATEGIA: Rate limit PERMISSIVO + BURST ALTO per UX, ma presente per DDoS
    # - Auth: Restrittivo (5 req/min) → Previene brute force
    # - API Read (feed/profile): Permissivo (600 req/min = 10 req/sec)
    # - API Write (post/comment): Moderato (120 req/min = 2 req/sec)
    # - General (pages): Permissivo (1000 req/min = 16 req/sec)
    #
    # CONFRONTO INDUSTRY:
    # - Twitter: ~300 req/15min = 20 req/min (ma per user autenticato)
    # - Facebook: ~200 req/hour = 3.3 req/min (per user)
    # - Need2Talk: ~600 req/min per IP (può avere multiple users)
    # ========================================================================

    # Zone per autenticazione (login, register, password reset)
    # STRICT: 5 req/min (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Zone per API READ endpoints (feed, profile, get audio)
    # PERMISSIVE: 600 req/min = 10 req/sec (scroll rapido feed permesso)
    limit_req_zone $binary_remote_addr zone=api_read:10m rate=600r/m;

    # Zone per API WRITE endpoints (post, comment, like, upload)
    # MODERATE: 120 req/min = 2 req/sec (previene spam ma permette uso normale)
    limit_req_zone $binary_remote_addr zone=api_write:10m rate=120r/m;

    # Zone per audio upload (STRICT - previene flood)
    # VERY RESTRICTIVE: 1 req/sec (audio upload è CPU-intensive)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=1r/s;

    # Zone generale per tutto il sito (HTML pages)
    # PERMISSIVE: 1000 req/min = 16 req/sec (navigazione rapida permessa)
    limit_req_zone $binary_remote_addr zone=general:10m rate=1000r/m;

    # ENTERPRISE GALAXY SECURITY FIX 2026-02-01: WebSocket connection rate limit
    # Prevents WebSocket connection flood attacks
    # MODERATE: 10 connections/min = allows reconnection but prevents mass opens
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=10r/m;

    # Limite connessioni simultanee per IP
    # 50 connessioni = Multiple tabs + streaming + concurrent requests
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Status code per rate limit exceeded
    limit_req_status 429;
    limit_conn_status 429;

    # ========================================================================
    # ENTERPRISE GALAXY: 429 Log Sampling (2025-12-22)
    # ========================================================================
    # PROBLEMA: Un attaccante può riempire il disco con log anche se bloccato
    #           1650 req = 462KB di log, 1M req = 280MB di log
    # SOLUZIONE: Logga solo 1% delle risposte 429 (rate limited)
    #            Abbastanza per debug, non abbastanza per riempire il disco
    # ========================================================================

    # Split clients randomly - 1% get sampled, 99% filtered
    split_clients $request_id $log_sample_429 {
        1%   1;   # Log this request
        *    0;   # Don't log
    }

    # Combine status with sample: log if NOT 429, OR if 429 AND sampled
    map "$status:$log_sample_429" $loggable_request {
        "429:0"  0;   # 429 + not sampled = don't log (99% of 429s)
        default  1;   # Everything else = log
    }

    # Open File Cache - ENTERPRISE PERFORMANCE
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
