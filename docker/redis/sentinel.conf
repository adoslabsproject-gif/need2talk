# ================================================================
# REDIS SENTINEL ENTERPRISE CONFIGURATION
# High Availability + Automatic Failover for need2talk cluster
# ================================================================

port 26379

# Hostname resolution for Docker networking
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Monitor Redis Master (need2talk_redis_master)
# Quorum: 1 (single sentinel for dev, use 2-3 in production)
sentinel monitor need2talk_master need2talk_redis_master 6379 1

# ENTERPRISE GALAXY: Master password authentication
sentinel auth-pass need2talk_master YOUR_REDIS_PASSWORD

# Master considered down after 5 seconds of no response
sentinel down-after-milliseconds need2talk_master 5000

# Only 1 replica can sync with master at a time (prevents overload)
sentinel parallel-syncs need2talk_master 1

# Failover timeout: 10 seconds
sentinel failover-timeout need2talk_master 10000

# Notification scripts (optional - for production monitoring)
# sentinel notification-script need2talk_master /path/to/notify.sh
# sentinel client-reconfig-script need2talk_master /path/to/reconfig.sh

# Logging
loglevel notice
