[PHP]
; Performance & Scalability Settings (ENTERPRISE GALAXY - Increased for high concurrency)
memory_limit = 4096M
max_execution_time = 120
max_input_vars = 3000
post_max_size = 64M
upload_max_filesize = 64M

; Session Configuration
; ENTERPRISE GALAXY: TTL fix - add timeout parameter to force 1h expiration
session.gc_maxlifetime = 3600
session.gc_probability = 1
session.gc_divisor = 1000
session.save_handler = redis
session.save_path = "tcp://redis:6379?database=1&prefix=n2t:sess:&timeout=3600"

; ENTERPRISE GALAXY (2025-11-30): Session Cookie Security
; CRITICAL: These MUST be set in php.ini, not just session_set_cookie_params()
; Otherwise PHP may start session with insecure defaults before our code runs
session.name = __Host-N2T_SESSION
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.cookie_path = /
session.cookie_domain =
session.use_strict_mode = 1
session.use_only_cookies = 1
session.use_trans_sid = 0

; OPcache Configuration
opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.interned_strings_buffer = 16
opcache.fast_shutdown = 1
opcache.enable_cli = 0

; Error Logging
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Date/Time
date.timezone = Europe/Rome

; Redis Extension - ENTERPRISE GALAXY: Optimized for High Concurrency
; Session locking to prevent race conditions, but optimized to avoid thundering herd
redis.session.locking_enabled = 1
redis.session.lock_retries = 100          ; Limit retries (was -1 infinite!)
redis.session.lock_wait_time = 2000       ; 2ms wait (was 10ms - 5x faster!)

; ========================================
; OPCACHE PRELOAD (PHP 7.4+) - ENTERPRISE GALAXY
; ========================================
; Precarica TUTTI i file critici in OPcache al boot del container
; Performance: First request 185ms → 5-10ms (NO compilation overhead)
; NOTA: Solo per PRODUCTION! In development disabilitare per hot-reload

; ========================================
; OPCACHE PRELOAD (PHP 7.4+) - ENTERPRISE GALAXY
; ========================================
; Precarica TUTTI i file critici ESCLUSO DebugbarService (vendor deps)
; Performance: First request 185ms → 5-10ms (NO compilation overhead)
opcache.preload = /var/www/html/app/Bootstrap/opcache_preload.php
opcache.preload_user = www
