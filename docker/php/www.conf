[www]
; ============================================================================
; PHP-FPM POOL - ENTERPRISE GALAXY CONFIGURATION (OPTIMIZED 2025-01-10)
; Tuned for 4-core AMD CPU + 16GB RAM = 8k-12k concurrent capacity
; ============================================================================

user = www-data
group = www-data

listen = 9000

; ENTERPRISE GALAXY: Listen backlog for high concurrency
; Supports up to 4k concurrent connections (sufficient for 8-12k users)
listen.backlog = 4096

; ============================================================================
; PROCESS MANAGER - DYNAMIC (OPTIMIZED FOR 4 CORES)
; ============================================================================
; RATIONALE:
; - 4 cores = max ~20 active workers (5 per core)
; - Pool of 50 workers = enough for burst traffic
; - Reduced from 200 to free 4.8GB RAM for PostgreSQL buffer pool
; - Each worker = ~32MB RAM = 50 × 32MB = 1.6GB total (vs 6.4GB before)
; ============================================================================
pm = dynamic

; OPTIMIZATION 2025-01-10: Reduced from 200 → 50 workers
; Frees 4.8GB RAM for PostgreSQL InnoDB buffer pool (1GB → 4GB upgrade)
pm.max_children = 50

; Start with 10 workers ready (4 core × 2.5 = balanced startup)
pm.start_servers = 10

; Keep at least 5 spare workers (prevents startup delay)
pm.min_spare_servers = 5

; Keep max 15 spare workers (prevents RAM waste)
pm.max_spare_servers = 15

; Max requests before worker restart (prevent memory leaks)
; ENTERPRISE: 1000 requests = ~30min lifespan (prevents slow memory growth)
pm.max_requests = 1000

; Process Idle Timeout (kill idle workers after 10s)
; OPTIMIZATION: Quick cleanup of unused workers = free RAM faster
pm.process_idle_timeout = 10s

; ============================================================================
; MONITORING & HEALTH CHECKS
; ============================================================================
; Status page: curl http://localhost/php-fpm-status?full (requires Nginx config)
pm.status_path = /php-fpm-status

; Ping endpoint: curl http://localhost/php-fpm-ping
ping.path = /php-fpm-ping
ping.response = pong

; ============================================================================
; LOGGING (ENTERPRISE GALAXY)
; ============================================================================
; Catch worker output (STDOUT/STDERR to logs)
catch_workers_output = yes
decorate_workers_output = no

; Slow request logging (requests taking >5 seconds)
; PERFORMANCE: Log slow queries for optimization
request_slowlog_timeout = 5s
slowlog = /var/www/html/storage/logs/php-fpm-slow.log

; Access log with detailed metrics
; Format: IP - User - Time - Method URI - Status - Script - Duration - Memory - CPU%
access.log = /var/www/html/storage/logs/php-fpm-access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; ============================================================================
; ENVIRONMENT VARIABLES
; ============================================================================
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

; ============================================================================
; RESOURCE LIMITS (ENTERPRISE)
; ============================================================================
; Max open files (file descriptors)
; ENTERPRISE: 65k files = supports high concurrency
rlimit_files = 65535

; Core dump size (0 = disabled for security)
rlimit_core = 0

; ============================================================================
; PERFORMANCE NOTES (2025-01-10 OPTIMIZATION)
; ============================================================================
; CAPACITY WITH THIS CONFIG (4 core, 16GB RAM):
; - Max concurrent users: 8,000-12,000
; - Sustained concurrent: 5,000-8,000
; - Peak burst: 12,000-15,000 (with aggressive caching)
;
; RAM SAVINGS:
; - Before: 200 workers × 32MB = 6.4GB (potential)
; - After: 50 workers × 32MB = 1.6GB (potential)
; - Freed: 4.8GB → Used for PostgreSQL buffer pool (1GB → 4GB)
;
; WHEN TO UPGRADE:
; - Monitor: docker stats, pm.status_path metrics
; - Warning: >80% workers active sustained (40/50)
; - Critical: >90% workers active (45/50)
; - Action: Upgrade to 8-core + increase pm.max_children to 100-120
; ============================================================================
