# Redis Enterprise Configuration for need2talk
# Optimized for 100k+ concurrent users

# Memory optimization
maxmemory 4gb
maxmemory-policy allkeys-lru

# Network optimization
tcp-keepalive 300
timeout 0

# Performance optimization
# Enable multiple databases for separation
databases 16

# Session management (DB 1)
# Cache management (DB 0) 
# Queue management (DB 2)
# Rate limiting (DB 3)

# Persistence for enterprise reliability
save 900 1
save 300 10
save 60 10000

# AOF for maximum durability
appendonly yes
appendfsync everysec

# Enterprise logging
loglevel notice
logfile /var/www/need2talk/storage/logs/redis-enterprise.log

# Security
requirepass need2talk_enterprise_secure_2024
rename-command FLUSHDB ""
rename-command FLUSHALL ""

# Network binding (secure)
bind 0.0.0.0
port 6379

# Client connection optimization for 100k+ users
maxclients 50000

# Memory usage reporting
latency-monitor-threshold 100

# Slow log for monitoring
slowlog-log-slower-than 10000
slowlog-max-len 128