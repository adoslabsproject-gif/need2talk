; 🚀 ENTERPRISE PHP Configuration for Email Workers
; Optimized for high-performance, long-running processes
; Disables problematic extensions that cause crashes

; Memory optimization for workers
memory_limit = 256M
max_execution_time = 0

; Disable output buffering for real-time logging
output_buffering = Off
implicit_flush = On

; Error reporting optimized for workers
display_errors = Off
log_errors = On
error_log = storage/logs/php_worker_errors.log

; Timezone
date.timezone = Europe/Rome

; Session - not needed for workers
session.auto_start = 0

; FORCE DISABLE Xdebug - CRITICAL for workers
; This MUST be at the top to override system configs
zend_extension=
xdebug.mode = off
xdebug.start_with_request = no
xdebug.auto_trace = 0
xdebug.collect_params = 0
xdebug.collect_return = 0
xdebug.show_exception_trace = 0
xdebug.profiler_enable = 0
xdebug.remote_enable = 0